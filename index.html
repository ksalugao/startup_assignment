<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="A basic HTML webpage">
        <title>Inventory Forecasting</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <h1>Inventory Forecasting</h1>
        </header>

        <nav>
            <ul>
                <li><a href="#inputs">Inputs</a></li>
                <li><a href="#outputs">Outputs</a></li>
            </ul>
        </nav>

        <main>
            <section id="inputs">
                <h2>Required Inputs</h2>
                <form id="product-form" action="#" method="POST">
                    <label for="name">Product Name:</label>
                    <input type="text" id="name" name="name" placeholder="Product Name" required/>

                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" name="quantity" placeholder="Quantity" required/>

                    <label for="sales">Average Daily Sales:</label>
                    <input type="number" id="sales" name="sales" placeholder="Average Daily Sales" required/>

                    <label for="days">Supplier Lead Time (days):</label>
                    <input type="number" id="days" name="days" placeholder="Supplier Lead Time (days)" required/>

                    <button type="submit" value="Submit" id="submit">Submit</button>
                </form>
            </section>

            <section id="outputs">
                <h2>Inventory Outputs</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Days Remaining Before Stockout</th>
                            <th>Reorder Warning</th>
                            <th>Inventory Status</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-table-body">
                        <tr>
                            <td colspan="4">No products added yet.</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Inventory Forecasting</p>
        </footer>

        <script src="TableDisplay.js"></script>
    </body>
</html>
