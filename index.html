<!DOCTYPE html> 
<html>
<head>

        <nav>
            <ul>
                <li><a href="#inputs">Inputs</a></li>
                <li><a href="#outputs">Outputs</a></li>
            </ul>
        </nav>

        <main>
            <section id="inputs">
                <h2>Required Inputs</h2>
                <form action="#" method="POST">
                    <label for="name">Product Name:</label>
                    <input type="text" id="name" name="name" placeholder="Product Name" required/>

                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" name="quantity" placeholder="Quantity" required/>

                    <label for="sales">Average Daily Sales:</label>
                    <input type="number" id="sales" name="sales" placeholder="Average Daily Sales" required/>

                    <label for="days">Supplier Lead Time (days):</label>
                    <input type="number" id="days" name="days" placeholder="Supplier Lead Time (days)" required/>

                    <button type="submit" value="Submit" id="submit">Submit</button>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Inventory Forecasting</p>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
